spring.application.name=data
server.port=8092
server.servlet.context-path=/data
spring.datasource.book.url=jdbc:postgresql://localhost:5432/book
spring.datasource.media.url=jdbc:postgresql://localhost:5432/media
spring.datasource.stock.url=jdbc:postgresql://localhost:5432/inventory
spring.datasource.location.url=jdbc:postgresql://localhost:5432/location
spring.datasource.username=admin
spring.datasource.password=admin
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.datasource.driver-class-name=org.postgresql.Driver

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.packages-to-scan=com.adc.data
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true
springdoc.swagger-ui.oauth.client-id=swagger-ui
springdoc.oauthflow.authorization-url=http://identity.local/realms/Identity/protocol/openid-connect/auth
springdoc.oauthflow.token-url=http://identity.local/realms/Identity/protocol/openid-connect/token

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://identity.local/realms/Identity

#app.sql.product="file:../src/main/resources/db/product/*.sql"
#app.sql.media="file:../src/main/resources/db/media/*.sql"

app.sql.product=classpath*:db/product/*.sql
app.sql.media=classpath*:db/media/*.sql
app.sql.stock=classpath*:db/inventory/*.sql
app.sql.location=classpath*:db/location/*.sql

# Seed sample data automatically on startup (idempotent SQL scripts)
app.seed.on-startup=true
# Retry settings: wait for other services to create their schema first
app.seed.max-retries=30
app.seed.retry-delay-ms=5000
