server.port=8080
server.servlet.context-path=/product
spring.threads.virtual.enabled=true

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/book
spring.datasource.username=admin
spring.datasource.password=admin
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto = none
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Search (Lucene backend) - full-text search
spring.jpa.properties.hibernate.search.backend.type=lucene
spring.jpa.properties.hibernate.search.backend.directory.root=/data/index
spring.jpa.properties.hibernate.search.backend.lucene_version=LUCENE_9_11_1
spring.jpa.properties.hibernate.search.backend.analysis.configurer=class:com.adc.product.config.SearchAnalysisConfigurer
spring.jpa.properties.hibernate.search.schema_management.strategy=create-or-update
# Mass indexing is triggered programmatically on startup (see SearchIndexInitializer)
spring.jpa.properties.hibernate.search.automatic_indexing.synchronization.strategy=write-sync


spring.security.oauth2.resourceserver.jwt.issuer-uri=http://identity.local/realms/Identity

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.packages-to-scan=com.adc.product
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true
springdoc.swagger-ui.oauth.client-id=swagger-ui
springdoc.oauthflow.authorization-url=http://identity.local/realms/Identity/protocol/openid-connect/auth
springdoc.oauthflow.token-url=http://identity.local/realms/Identity/protocol/openid-connect/token

# Dev
# adc.services.order=http://localhost:8085/order/
# adc.services.media=http://localhost:8083/media

# Prod
adc.services.order=http://order
adc.services.media=http://media/media

cors.allowed-origins=*

# Resilience4j - Retry (used by @Retry(name="restApi"))
resilience4j.retry.instances.restApi.max-attempts=2
resilience4j.retry.instances.restApi.wait-duration=200ms
resilience4j.retry.instances.restApi.retry-exceptions=org.springframework.web.client.ResourceAccessException,java.io.IOException

# Resilience4j - Circuit Breaker (used by @CircuitBreaker(name="restCircuitBreaker"))
resilience4j.circuitbreaker.instances.restCircuitBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.restCircuitBreaker.sliding-window-size=20
resilience4j.circuitbreaker.instances.restCircuitBreaker.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.restCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.restCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.restCircuitBreaker.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.restCircuitBreaker.automatic-transition-from-open-to-half-open-enabled=true


