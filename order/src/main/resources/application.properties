spring.application.name=order
server.servlet.context-path=/order
server.port=8085

spring.threads.virtual.enabled=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://identity.local/realms/Identity

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/order
spring.datasource.username=admin
spring.datasource.password=admin
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto = none
spring.jpa.open-in-view=false
spring.liquibase.enabled=true

# services.customer=http://localhost:8088/customer
# services.product=http://localhost:8080/product
# services.inventory=http://localhost:8086/inventory
services.customer=http://customer/customer
services.product=http://product/product
services.inventory=http://inventory/inventory

springdoc.swagger-ui.path=/swagger-ui
springdoc.packages-to-scan=com.adc.order
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true
springdoc.swagger-ui.oauth.client-id=swagger-ui
springdoc.oauthflow.authorization-url=http://identity.local/realms/Identity/protocol/openid-connect/auth
springdoc.oauthflow.token-url=http://identity.local/realms/Identity/protocol/openid-connect/token

# Kafka configuration for outbox relay
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
outbox.relay.topic=order-events
outbox.relay.poll-ms=5000